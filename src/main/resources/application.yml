server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lecture_archive?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

cloud:
  aws:
    region: ap-northeast-2
    s3:
      bucket: your-bucket-name

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-change-this-to-a-long-secret}
    issuer: lecture-archive
    access-token-exp-minutes: 60
  cdn:
    base-url: https://your-bucket-name.s3.ap-northeast-2.amazonaws.com
